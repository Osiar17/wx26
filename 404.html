<style>
  :root{--blue-black:#0A0E1A;--bone:#ECE3D0;--gold:#C6A24C;--ink:#c9c3b4;--ink-soft:#9a9686}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(120% 95% at 50% 118%,rgba(54,78,128,.34),transparent 55%),
      linear-gradient(180deg,#070A14 0%,#0B0F1A 60%,#090D16 100%);
    color:var(--bone);font-family:'EB Garamond',Georgia,serif;
    display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
  main{max-width:34rem;text-align:center}
  .mark{width:56px;height:56px;margin:0 auto 1.6rem;display:block}
  .eyebrow{font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;letter-spacing:.32em;
    text-transform:uppercase;font-size:.7rem;color:var(--gold);margin:0 0 1rem}
  h1{font-family:'Cinzel',Georgia,serif;font-weight:600;font-size:clamp(2rem,6vw,3rem);
    line-height:1.08;margin:0 0 1rem;color:var(--bone)}
  p{font-size:1.08rem;line-height:1.6;color:var(--ink);margin:0 0 1.8rem}
  .links{display:flex;flex-wrap:wrap;gap:.7rem;justify-content:center}
  .links a{font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;font-size:.72rem;color:var(--bone);text-decoration:none;
    border:1px solid rgba(236,227,208,.22);border-radius:999px;padding:.7rem 1.15rem;
    min-height:44px;display:inline-flex;align-items:center;transition:color .3s,border-color .3s,background .3s}
  .links a:hover,.links a:focus-visible{color:var(--gold);border-color:rgba(198,162,76,.6);
    background:rgba(198,162,76,.08);outline:none}
  .links a.primary{color:var(--blue-black);background:var(--gold);border-color:var(--gold)}
  .links a.primary:hover,.links a.primary:focus-visible{background:#d4b25c;color:var(--blue-black)}
  a:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
</style>
</head>
<body>
<main>
  <!-- Official WX monogram (Pass 9.1A). Decorative here (alt="") because the
       visible "Worship Experience 2026" eyebrow already names the site. -->
  <img class="mark" src="assets/icons/favicon.svg?v=2026.9.1J" alt="" width="56" height="56" decoding="async">
  <p class="eyebrow">Worship Experience 2026</p>
  <h1>This page isn’t here.</h1>
  <p>The link may be mistyped, or it points to a resource that hasn’t been published yet. Let’s get you back to the Workspace.</p>
  <nav class="links" id="links" aria-label="Return to the site">
    <!-- Static fallbacks (correct when 404 is served at the site root). The
         script below rewrites them to the deployment base so they also work
         from a repository subpath on GitHub Pages. -->
    <a class="primary" href="index.html#hub" data-rel="index.html#hub">Return to the Workspace</a>
    <a href="concept.html" data-rel="concept.html">Concept</a>
    <a href="theme-brief.html" data-rel="theme-brief.html">Theme</a>
    <a href="setlist.html" data-rel="setlist.html">Setlist</a>
  </nav>
</main>
<script>
  /* Resolve links against the deployment base so they work whether the site is
     served from the domain root (user/org pages, custom domain) or a repository
     subpath (project pages: username.github.io/<repo>/…). GitHub serves this
     404.html for any unmatched path, so the document URL is the *missing* path;
     relative links alone can resolve incorrectly for nested missing paths. */
  (function(){
    var host=location.hostname, parts=location.pathname.split('/').filter(Boolean), base='/';
    // github.io project pages keep the repo as the first path segment.
    if(/\.github\.io$/i.test(host) && parts.length>=1){ base='/'+parts[0]+'/'; }
    var links=document.querySelectorAll('#links a[data-rel]');
    for(var i=0;i<links.length;i++){ links[i].setAttribute('href', base+links[i].getAttribute('data-rel')); }
  })();
</script>
</body></html>
